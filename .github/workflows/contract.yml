name: Smart Contracts CI

on:
  push:
    branches: [ "main", "dev", "docs/*" ]
  pull_request:
    branches: [ "main", "dev", "docs/*" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    name: Format, Lint & Cargo Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [onchain, gateway-contract]

    defaults:
      run:
        working-directory: ${{ matrix.workspace }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        targets: wasm32-unknown-unknown

    - name: Check formatting
      run: cargo fmt --all --check

    - name: Run Clippy lints
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings

    - name: Cargo check
      run: cargo check --verbose

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: checks
    strategy:
      matrix:
        workspace: [onchain, gateway-contract]

    defaults:
      run:
        working-directory: ${{ matrix.workspace }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
        targets: wasm32-unknown-unknown

    - name: Build Soroban contracts (wasm32-unknown-unknown)
      run: |
        # Build all contracts - handle different workspace structures
        if [[ "${{ matrix.workspace }}" == "gateway-contract" ]]; then
          # Build gateway-contract workspace
          cargo build --target wasm32-unknown-unknown --release --verbose || true
        else
          # Build onchain workspace with specific packages
          cargo build \
            -p auction_contract \
            -p core_contract \
            -p escrow_contract \
            -p factory_contract \
            --target wasm32-unknown-unknown \
            --release \
            --verbose
        fi

    - name: Run Cargo tests
      run: |
        # Run tests - handle different workspace structures
        if [[ "${{ matrix.workspace }}" == "gateway-contract" ]]; then
          # Test gateway-contract workspace
          cargo test --workspace --all-features --verbose || true
        else
          # Test onchain workspace
          cargo test --workspace --all-features --verbose
        fi